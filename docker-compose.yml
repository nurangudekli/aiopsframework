version: "3.9"

services:
  # ── Backend API ──
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  # ── Frontend dev server ──
  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

  # ── Redis (optional — for caching / job queue) ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
